<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0e27"/>
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="112" fill="url(#bg-gradient)" opacity="0.6"/>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2050"/>
      <stop offset="1" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="cap-gradient" x1="128" y1="160" x2="384" y2="267" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chart-gradient" x1="213" y1="320" x2="347" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Graduation cap -->
  <!-- Cap top (diamond) -->
  <path d="M256 139 L400 208 L256 277 L112 208 Z" fill="url(#cap-gradient)" filter="url(#glow)"/>
  <!-- Cap base -->
  <path d="M176 235 L176 288 Q176 315 256 315 Q336 315 336 288 L336 235 L256 271 Z" fill="#2563eb" opacity="0.85"/>
  <!-- Tassel -->
  <path d="M400 208 L400 267 Q400 288 389 293 L379 299" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="379" cy="304" r="10" fill="#60a5fa"/>

  <!-- Chart bars (mini bar chart below cap) -->
  <rect x="192" y="347" width="27" height="58" rx="5" fill="url(#chart-gradient)" opacity="0.5"/>
  <rect x="229" y="325" width="27" height="80" rx="5" fill="url(#chart-gradient)" opacity="0.7"/>
  <rect x="266" y="304" width="27" height="101" rx="5" fill="url(#chart-gradient)" opacity="0.85"/>
  <rect x="303" y="283" width="27" height="122" rx="5" fill="url(#chart-gradient)"/>

  <!-- Trend arrow -->
  <path d="M181 363 L219 336 L251 347 L320 288" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <path d="M299 288 L320 288 L320 309" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- "AU" text at bottom -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#60a5fa" text-anchor="middle" opacity="0.9">AU Track</text>
</svg>
