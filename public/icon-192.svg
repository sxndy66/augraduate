<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#0a0e27"/>
  <!-- Subtle gradient overlay -->
  <rect width="192" height="192" rx="42" fill="url(#bg-gradient)" opacity="0.6"/>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2050"/>
      <stop offset="1" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="cap-gradient" x1="48" y1="60" x2="144" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chart-gradient" x1="80" y1="120" x2="130" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Graduation cap -->
  <!-- Cap top (diamond) -->
  <path d="M96 52 L150 78 L96 104 L42 78 Z" fill="url(#cap-gradient)"/>
  <!-- Cap base -->
  <path d="M66 88 L66 108 Q66 118 96 118 Q126 118 126 108 L126 88 L96 102 Z" fill="#2563eb" opacity="0.85"/>
  <!-- Tassel -->
  <path d="M150 78 L150 100 Q150 108 146 110 L142 112" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="142" cy="114" r="4" fill="#60a5fa"/>

  <!-- Chart bars (mini bar chart below cap) -->
  <rect x="72" y="130" width="10" height="22" rx="2" fill="url(#chart-gradient)" opacity="0.5"/>
  <rect x="86" y="122" width="10" height="30" rx="2" fill="url(#chart-gradient)" opacity="0.7"/>
  <rect x="100" y="114" width="10" height="38" rx="2" fill="url(#chart-gradient)" opacity="0.85"/>
  <rect x="114" y="106" width="10" height="46" rx="2" fill="url(#chart-gradient)"/>

  <!-- Trend arrow -->
  <path d="M68 136 L82 126 L94 130 L120 108" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <path d="M112 108 L120 108 L120 116" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
</svg>
