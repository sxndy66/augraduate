<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Full-bleed background for maskable icon (safe zone is center 80%) -->
  <rect width="512" height="512" fill="#0a0e27"/>
  <rect width="512" height="512" fill="url(#bg-gradient)" opacity="0.6"/>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2050"/>
      <stop offset="1" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="cap-gradient" x1="160" y1="190" x2="352" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chart-gradient" x1="240" y1="320" x2="340" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Safe zone: content within center 80% (roughly 50px padding all sides) -->
  <!-- Graduation cap (scaled to fit safe zone) -->
  <path d="M256 165 L370 218 L256 271 L142 218 Z" fill="url(#cap-gradient)"/>
  <path d="M190 240 L190 285 Q190 305 256 305 Q322 305 322 285 L322 240 L256 272 Z" fill="#2563eb" opacity="0.85"/>
  <!-- Tassel -->
  <path d="M370 218 L370 265 Q370 280 362 284 L354 288" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="354" cy="292" r="8" fill="#60a5fa"/>

  <!-- Chart bars -->
  <rect x="205" y="340" width="22" height="47" rx="4" fill="url(#chart-gradient)" opacity="0.5"/>
  <rect x="235" y="322" width="22" height="65" rx="4" fill="url(#chart-gradient)" opacity="0.7"/>
  <rect x="265" y="305" width="22" height="82" rx="4" fill="url(#chart-gradient)" opacity="0.85"/>
  <rect x="295" y="288" width="22" height="99" rx="4" fill="url(#chart-gradient)"/>

  <!-- Trend arrow -->
  <path d="M196 352 L228 330 L252 339 L308 295" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <path d="M291 295 L308 295 L308 312" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
</svg>
